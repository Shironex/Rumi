name: release

# Tag a version to cut a release, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is arm64-only for now: the x64 (Intel) smoke is flaky on the
          # runner and Apple is sunsetting Intel, so x64 mac is on the roadmap.
          # macos-15 is the current arm64 pin (macOS 26 is GA, so 14 is on the
          # deprecation path).
          - runner: macos-15
            asset: rumi-macos-arm64
          - runner: ubuntu-latest
            asset: rumi-linux-x64
          - runner: ubuntu-24.04-arm
            asset: rumi-linux-arm64
          # Windows is experimental: only published if the smoke is green on the
          # runner (proves the OpenTUI win32 native module loads + the tree mounts).
          - runner: windows-latest
            asset: rumi-windows-x64.exe
    runs-on: ${{ matrix.runner }}
    # Native compile + smoke; cap well below the 6h default to protect runner minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Stamp the tag into the version constant so `rumi --version` matches the release.
      - name: Stamp version
        shell: bash
        run: |
          v="${GITHUB_REF_NAME#v}"
          sed -i.bak 's/VERSION = "[^"]*"/VERSION = "'"$v"'"/' src/version.ts && rm -f src/version.ts.bak
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$v"'"/' package.json && rm -f package.json.bak
      # Gate the binary on a passing render: don't publish a crash-on-launch build.
      # Step timeout backs up the in-script watchdog so a render deadlock fails
      # this build instead of hanging the runner.
      - run: bun run smoke
        timeout-minutes: 5
      - name: Build (native, no cross-compile — OpenTUI ships per-platform native modules)
        run: bun build --compile ./src/index.tsx --outfile "${{ matrix.asset }}"
      - name: Ad-hoc sign (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: codesign --force --sign - "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
