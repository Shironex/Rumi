name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Cap the whole job well below the 6h default so a stuck step can't burn minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # On Windows this also proves the OpenTUI win32 native module loads and the
      # React tree mounts (testRender uses the real renderer in-memory). The
      # step timeout is a backstop in case the in-script watchdog ever misses.
      - run: bun run smoke
        timeout-minutes: 5
